---
- name: Configure Windows VM - Mount File Share and Disable Firewall
  hosts: windows
  tasks:
    - name: Disable Windows Firewall (all profiles)
      win_shell: |
        Set-NetFirewallProfile -Profile Domain,Public,Private -Enabled False

    - name: Mount Azure File Share as Z drive (global mapping)
      win_shell: |
        $existing = Get-SmbGlobalMapping -LocalPath "Z:" -ErrorAction SilentlyContinue
        if (-not $existing) {
            $secureKey = ConvertTo-SecureString -String "{{ storage_account_key }}" -AsPlainText -Force
            $cred = New-Object System.Management.Automation.PSCredential("AZURE\{{ storage_account_name }}", $secureKey)
            New-SmbGlobalMapping -RemotePath "\\{{ storage_account_name }}.file.core.windows.net\{{ file_share_name }}" -Credential $cred -LocalPath "Z:" -Persistent $true
        }
